<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Editor - Pre Register</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="hero">
    <h1>My Editor</h1>
    <p>Edit Everything. Limit Nothing.</p>

    <div class="countdown">
      <h2>Launching In</h2>
      <div id="countdown">Loading...</div>
    </div>

    <input id="email" placeholder="Enter email">
    <button onclick="join()">Join Waitlist</button>

    <p id="status"></p>
  </div>

  <!-- ADS (MONETIZATION READY) -->
  <div class="ad-box">
    Advertisement Space
  </div>

  <!-- LEADERBOARD -->
  <div class="board">
    <h3>Top Referrals</h3>
    <div id="leaderboard"></div>
  </div>

  <!-- COOKIE BANNER -->
  <div id="cookie">
    We use cookies for analytics.
    <button onclick="acceptCookies()">Accept</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
